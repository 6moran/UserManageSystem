<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台登录</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="/static/css/common.css" rel="stylesheet">
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- 通用提示弹窗 -->
<div class="modal fade" id="messageModal" tabindex="-1">
 <div class="modal-dialog modal-dialog-centered">
  <div class="modal-content">

   <div class="modal-header">
    <h5 class="modal-title" id="modalTitle">提示</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
   </div>

   <div class="modal-body" id="modalBody">
    这里是内容
   </div>

   <div class="modal-footer">
    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalConfirmBtn">确定</button>
   </div>

  </div>
 </div>
</div>

<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
 <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">后台登录</h1>

 <form id="loginForm">

  <!-- 邮箱输入 -->
  <div class="mb-4">
   <label for="email" class="block text-sm font-medium text-gray-700">
    邮箱
   </label>
   <input type="text" id="email" name="email"
          placeholder="请输入邮箱"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          required />
  </div>

  <!-- 密码输入 -->
  <div class="mb-6">
   <label for="password" class="block text-sm font-medium text-gray-700">
    密码
   </label>
   <input type="password" id="password" name="password"
          placeholder="请输入密码"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm
                              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          required />
  </div>

  <!-- 登录按钮 -->
  <button type="submit"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md
                           hover:bg-blue-700 focus:outline-none
                           focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
   登录
  </button>

  <!-- 底部左右分布 -->
  <div class="mt-6 flex justify-between text-sm">

   <!-- 左侧：立即注册 -->
   <div>
    还没有账号？
    <a href="/register"
       class="text-blue-600 font-medium hover:text-blue-700">
     立即注册
    </a>
   </div>

   <!-- 右侧：忘记密码 -->
   <div>
    <a href="#"
       class="text-blue-600 hover:text-blue-500">
     忘记密码？
    </a>
   </div>

  </div>
 </form>
</div>
<script src="/static/js/common.js"></script>
<script src="/static/js/login_register.js"></script>
<script src="/static/js/login.js"></script>
</body>

</html>
