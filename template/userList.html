<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台管理系统</title>
 <script src="https://unpkg.com/feather-icons"></script>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="/static/css/common.css" rel="stylesheet">
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
 <script>
  dayjs.extend(dayjs_plugin_utc); // 必须先扩展
 </script>
 <style>
  /* 自定义滚动条 */
  ::-webkit-scrollbar {
   width: 8px;
  }

  ::-webkit-scrollbar-track {
   background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 4px;
  }
 </style>
</head>

<body class="bg-gray-100">

<!-- 通用提示弹窗 -->
<div class="modal fade" id="messageModal" tabindex="-1">
 <div class="modal-dialog modal-dialog-centered">
  <div class="modal-content">

   <div class="modal-header">
    <h5 class="modal-title" id="modalTitle">提示</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
   </div>

   <div class="modal-body" id="modalBody">
    这里是内容
   </div>

   <div class="modal-footer">
    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalConfirmBtn">确定</button>
   </div>

  </div>
 </div>
</div>

 <!-- 侧边栏 -->
 <aside class="bg-gray-800 text-white w-64 fixed h-full p-4 !p-4  overflow-y-auto">
  <div class="mb-8">
   <h1 class="text-xl font-bold">后台管理系统</h1>
   <p class="text-gray-400 text-sm mt-1">v2.1.0</p>
  </div>
  <nav>
   <ul class="space-y-2">
    <li>
     <a href="/index" class="flex items-center p-2 hover:bg-gray-700 rounded">
      <i data-feather="home" class="w-4 h-4 mr-2"></i> 首页概览
     </a>
    </li>
    <li>
     <a href="/userList" class="flex items-center p-2 bg-gray-700 text-white rounded">
      <i data-feather="users" class="w-4 h-4 mr-2"></i> 用户管理
     </a>
    </li>
    <!-- 更多菜单项... -->
   </ul>
  </nav>
 </aside>

 <!-- 全局顶部导航 -->
 <header class="ml-64 fixed w-[calc(100%-16rem)] bg-white shadow-sm z-10">
  <div class="flex justify-between items-center px-8 py-3">
   <h2 class="text-xl font-bold m-0 leading-none" id="pageTitle"></h2>
   <div class="flex items-center gap-4">
    <button class="p-2 hover:bg-gray-100 rounded-full">
     <i data-feather="bell"></i>
    </button>
    <div class="flex items-center gap-2">
     <img id="userAvatar" class="w-8 h-8 rounded-full">
     <button onclick="logout()" class="text-red-600 hover:text-red-700 flex items-center gap-1">
      <i data-feather="log-out" class="w-5 h-5"></i>
      <span class="hidden sm:inline">退出系统</span>
     </button>
    </div>
   </div>
  </div>
 </header>

 <!-- 主内容容器 -->
 <main class="ml-64 pt-20 p-8" id="mainContent">

  <div class="space-y-6">
   <!-- 操作栏 -->
   <div class="flex flex-col sm:flex-row justify-between gap-4">
    <div class="flex flex-col sm:flex-row gap-4">
     <!-- 搜索框宽度优化 -->
     <div class="relative flex-[2_2_0%] min-w-[200px]">
      <input id = "keywordInput" type="text" placeholder="搜索用户..."
       class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
      <i data-feather="search" class="absolute left-3 top-2.5 text-gray-400"></i>
     </div>

     <!-- 新增状态筛选 -->
     <select class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 flex-1" id="statusFilter">
      <option value="">全部状态</option>
      <option value="1">启用</option>
      <option value="0">禁用</option>
     </select>
    </div>
   </div>

   <!-- 用户表格 -->
   <div class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full">
     <thead class="bg-gray-50">
      <tr>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">用户名</th>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">角色</th>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">创建时间</th>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">最后登录</th>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">状态</th>
       <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">操作</th>
      </tr>
     </thead>
     <tbody id="userTableBody" class="divide-y divide-gray-200">
     </tbody>
    </table>
   </div>

   <!-- 分页 -->
   <div class="flex justify-between items-center px-4 py-3 bg-white rounded-xl shadow">
    <!-- 总条数 -->
    <div class="text-gray-500">
     共 <span id="totalCount">0</span> 条
    </div>
    <div id="paginationButtons" class="flex justify-end gap-2"></div>
   </div>
  </div>


  <!-- 用户模态框  -->
  <div id="userModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
   <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h3 class="text-xl font-bold mb-4">修改用户信息</h3>
    <form class="space-y-4">
     <!-- 头像上传 -->
     <div>
      <label class="block text-sm font-medium mb-2">头像</label>
      <div class="flex items-center gap-4">
      <!-- 头像预览 -->
      <img id="avatarPreview" class="w-16 h-16 rounded-full object-cover border">
      <!-- 上传按钮 -->
      <input id="avatarInput"
             type="file"
             accept="image/*"
             class="text-sm">
     </div>
    </div>
     <div>
      <label class="block text-sm font-medium mb-1">用户名</label>
      <input id="editUsername" type="text" class="w-full px-2 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
     </div>
     <div>
      <label class="block text-sm font-medium mb-1">密码</label>
      <input id="editPassword" type="password" class="w-full px-2 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
     </div>
     <div class="mb-4">
      <label class="block text-sm font-medium mb-1">用户状态</label>
      <select id="userStatus" class="w-full px-2 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100 disabled:text-gray-500">
       <option value="1">启用</option>
       <option value="0">禁用</option>
      </select>
      
     </div>
     <div class="flex justify-end gap-2">
      <button type="button" onclick="closeUserModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
       取消
      </button>
      <button onclick="saveUser()" type="button" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
       提交
      </button>
     </div>
   </form>
   </div>
  </div>
 </main>
 <script src="/static/js/common.js"></script>
 <script src="/static/js/userList.js"></script>
</body>

</html>
