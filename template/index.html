<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台管理系统</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/feather-icons"></script>
 <style>
  /* 自定义滚动条 */
  ::-webkit-scrollbar {
   width: 8px;
  }

  ::-webkit-scrollbar-track {
   background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 4px;
  }
 </style>
</head>

<body class="bg-gray-100">
 <!-- 侧边栏 -->
 <aside class="bg-gray-800 text-white w-64 fixed h-full p-4 overflow-y-auto">
  <div class="mb-8">
   <h1 class="text-xl font-bold">后台管理系统</h1>
   <p class="text-gray-400 text-sm mt-1">v2.1.0</p>
  </div>
  <nav>
   <ul class="space-y-2">
    <li>
     <a href="/index" class="flex items-center p-2 bg-gray-700 text-white rounded">
      <i data-feather="home" class="w-4 h-4 mr-2"></i> 首页概览
     </a>
    </li>
    <li>
     <a href="/userList" class="flex items-center p-2 hover:bg-gray-700 rounded">
      <i data-feather="users" class="w-4 h-4 mr-2"></i> 用户管理
     </a>
    </li>
    <!-- 更多菜单项... -->
   </ul>
  </nav>
 </aside>

 <!-- 全局顶部导航 -->
 <header class="ml-64 fixed w-[calc(100%-16rem)] bg-white shadow-sm z-10">
  <div class="flex justify-between items-center px-8 py-4">
   <h2 class="text-xl font-bold" id="pageTitle"></h2>
   <div class="flex items-center gap-4">
    <button class="p-2 hover:bg-gray-100 rounded-full">
     <i data-feather="bell"></i>
    </button>
    <div class="flex items-center gap-2">
     <img id="userAvatar" class="w-8 h-8 rounded-full">
     <button onclick="logout()" class="text-red-600 hover:text-red-700 flex items-center gap-1">
      <i data-feather="log-out" class="w-5 h-5"></i>
      <span class="hidden sm:inline">退出系统</span>
     </button>
    </div>
   </div>
  </div>
 </header>

 <!-- 主内容容器 -->
 <main class="ml-64 pt-20 p-8" id="mainContent">

  <!-- 首页专属内容 -->
  <div class="space-y-6">
   <!-- 数据统计卡片 -->

    <div class="bg-white p-6 rounded-xl shadow">

      <div>
       <p class="text-gray-500 text-sm">注册用户</p>
       <p class="text-3xl font-bold mt-2">2,843</p>
      </div>
      <div class="bg-blue-100 p-3 rounded-full">
       <i data-feather="users" class="w-6 h-6 text-blue-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-green-500">↑ 15.2%</span> 上月增长
     </div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow">
     <div class="flex justify-between items-center">
      <div>
       <p class="text-gray-500 text-sm">注册用户</p>
       <p class="text-3xl font-bold mt-2">2,843</p>
      </div>
      <div class="bg-blue-100 p-3 rounded-full">
       <i data-feather="users" class="w-6 h-6 text-blue-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-green-500">↑ 15.2%</span> 上月增长
     </div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow">
     <div class="flex justify-between items-center">
      <div>
       <p class="text-gray-500 text-sm">注册用户</p>
       <p class="text-3xl font-bold mt-2">2,843</p>
      </div>
      <div class="bg-blue-100 p-3 rounded-full">
       <i data-feather="users" class="w-6 h-6 text-blue-600"></i>
      </div>
     </div>
     <div class="mt-4 text-sm">
      <span class="text-green-500">↑ 15.2%</span> 上月增长
     </div>
    </div>
    <!-- 更多卡片... -->
   </div>

   <!-- 访问趋势图表 -->
   <div class="bg-white p-6 rounded-xl shadow">
    <div class="flex justify-between items-center mb-4">
     <h3 class="text-lg font-semibold">访问趋势</h3>
     <div class="flex gap-2">
      <button class="text-sm px-3 py-1 rounded-lg bg-gray-100">7天</button>
      <button class="text-sm px-3 py-1 rounded-lg hover:bg-gray-100">30天</button>
     </div>
    </div>
    <div class="h-80 bg-gray-50 rounded-lg flex items-center justify-center">
     <i data-feather="bar-chart-2" class="w-16 h-16 text-gray-300"></i>
    </div>
   </div>
  </div>
 </main>


<script src="/static/js/index.js"></script>
</body>

</html>
