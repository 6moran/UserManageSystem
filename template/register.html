<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<!-- 通用提示弹窗 -->
<div class="modal fade" id="messageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">提示</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalBody">
                这里是内容
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalConfirmBtn">确定</button>
            </div>

        </div>
    </div>
</div>

<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">用户注册</h1>

    <form id="registerForm">

        <!-- 邮箱 -->
        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   required />
        </div>

        <!-- 密码 -->
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
            <div class="relative">
                <input type="password" id="password" name="password"
                       placeholder="请输入密码"
                       class="mt-1 block w-full px-4 py-2 pr-10 border border-gray-300 rounded-md shadow-sm
                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       required />
                <span id="togglePwd" class="absolute right-3 top-3 cursor-pointer opacity-70 hover:opacity-100"></span>
            </div>
        </div>

        <!-- 确认密码 -->
        <div class="mb-6">
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700">确认密码</label>
            <div class="relative">
                <input type="password" id="confirmPassword" name="password"
                       placeholder="请再次输入密码"
                       class="mt-1 block w-full px-4 py-2 pr-10 border border-gray-300 rounded-md shadow-sm
                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       required />
                <span id="toggleConfirmPwd" class="absolute right-3 top-3 cursor-pointer opacity-70 hover:opacity-100"></span>
            </div>
        </div>

        <!-- 注册按钮 -->
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md
                hover:bg-blue-700 focus:outline-none focus:ring-2
                focus:ring-blue-500 focus:ring-offset-2">
            注册
        </button>

        <!-- 登录跳转 -->
        <div class="mt-4 text-center">
            <span class="text-sm text-gray-600">已有账号？</span>
            <a href="/login" class="text-sm text-blue-600 hover:text-blue-500">立即登录</a>
        </div>

    </form>
</div>
<script src="/static/js/common.js"></script>
<script src="/static/js/login_register.js"></script>
<script src="/static/js/register.js"></script>
</body>

</html>
